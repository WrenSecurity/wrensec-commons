<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Wren Security API</title>
    <link rel="stylesheet" type="text/css" href="swagger-ui.css">
</head>
<body>
<div id="swagger-ui"></div>
<script src="swagger-ui-bundle.js"></script>
<script src="swagger-ui-standalone-preset.js"></script>
<script>
    const params = new URLSearchParams(window.location.search);
    const url = params.get("url") || "https://petstore.swagger.io/v2/swagger.json";
    const title = params.get("title");
    if (title) {
        document.title = title;
    }
    SwaggerUIBundle({
        url: url,
        dom_id: "#swagger-ui",
        presets: [
            SwaggerUIBundle.presets.apis,
            SwaggerUIStandalonePreset
        ],
        plugins: [
            SwaggerUIBundle.plugins.DownloadUrl
        ],
        layout: "StandaloneLayout",
        docExpansion: "none",
        defaultModelsExpandDepth: -1,
        requestInterceptor: function(req) {
            const url = new URL(req.url, window.location);
            // CREST API uses URL fragment for path uniqueness
            // We want to remove the fragment and fix the parameters appended by Swagger UI
            if (url.hash && url.hash.indexOf("?") > 0) {
                url.search = url.hash.substring(url.hash.indexOf("?"));
            }
            url.hash = "";
            req.url = url.toString();
            return req;
        }
    });
</script>
</body>
</html>
